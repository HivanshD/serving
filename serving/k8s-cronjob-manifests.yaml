# serving/k8s-cronjob-manifests.yaml
#
# CronJob manifests for serving's automated monitoring scripts.
# Serving owns these specs; DevOps applies them to the cluster.
#
# These run inside the subst-serving-onnx image (no separate image needed)
# because check_rollback.py and check_promote.py are already baked in at
# /app/scripts/.
#
# Apply with:
#   kubectl apply -f k8s-cronjob-manifests.yaml

---
# 1. ServiceAccount for CronJobs that need to read deployments
apiVersion: v1
kind: ServiceAccount
metadata:
  name: subst-cronjob-sa
  namespace: canary-proj01

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-reader
  namespace: canary-proj01
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: subst-cronjob-sa-deployment-reader
  namespace: canary-proj01
subjects:
  - kind: ServiceAccount
    name: subst-cronjob-sa
    namespace: canary-proj01
roleRef:
  kind: Role
  name: deployment-reader
  apiGroup: rbac.authorization.k8s.io

---
# 2. check_rollback CronJob — production-proj01, every 5 min
apiVersion: batch/v1
kind: CronJob
metadata:
  name: check-rollback
  namespace: production-proj01
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: check-rollback
              image: subst-serving-onnx:latest
              command: ["python", "/app/scripts/check_rollback.py"]
              env:
                - name: PROMETHEUS_URL
                  value: "http://prometheus.monitoring-proj01:9090"
                - name: DEVOPS_HOOK
                  value: "http://automation.monitoring-proj01:8080"
                - name: NAMESPACE
                  value: "production-proj01"
                - name: LATENCY_P95_THRESHOLD_S
                  value: "0.5"
                - name: ERROR_RATE_THRESHOLD
                  value: "0.05"

---
# 3. check_promote CronJob — canary-proj01, every 5 min
# Needs kubectl access to read deployment age → uses subst-cronjob-sa
apiVersion: batch/v1
kind: CronJob
metadata:
  name: check-promote
  namespace: canary-proj01
spec:
  schedule: "*/5 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: subst-cronjob-sa
          restartPolicy: Never
          containers:
            - name: check-promote
              image: subst-serving-onnx:latest
              command: ["python", "/app/scripts/check_promote.py"]
              env:
                - name: PROMETHEUS_URL
                  value: "http://prometheus.monitoring-proj01:9090"
                - name: DEVOPS_HOOK
                  value: "http://automation.monitoring-proj01:8080"
                - name: CANARY_NS
                  value: "canary-proj01"
                - name: PROD_NS
                  value: "production-proj01"
                - name: DEPLOYMENT_NAME
                  value: "subst-serving"
                - name: LATENCY_RATIO_LIMIT
                  value: "1.1"
                - name: CANARY_ERROR_LIMIT
                  value: "0.02"
                - name: CANARY_MIN_AGE_MIN
                  value: "30"
