apiVersion: apps/v1
kind: Deployment
metadata:
  name: substitution-serving
  namespace: forkwise-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: substitution-serving
  template:
    metadata:
      labels:
        app: substitution-serving
    spec:
      nodeSelector:
        kubernetes.io/hostname: node1
      containers:
        - name: substitution-serving
          image: substitution-serving:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: ONNX_MODEL_PATH
              value: subst_model.onnx
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
