apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation
  namespace: monitoring-proj01
spec:
  replicas: 1
  selector:
    matchLabels:
      app: automation
  template:
    metadata:
      labels:
        app: automation
    spec:
      serviceAccountName: automation-sa
      nodeSelector:
        forkwise.io/entrypoint: "true"
      containers:
        - name: automation
          image: forkwise-automation:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MODEL_BUCKET
              value: models-proj01
            - name: OS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: os-credentials
                  key: OS_ENDPOINT
            - name: OS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: os-credentials
                  key: OS_ACCESS_KEY
            - name: OS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: os-credentials
                  key: OS_SECRET_KEY
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
