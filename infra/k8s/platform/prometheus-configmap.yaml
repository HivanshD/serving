apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring-proj01
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
            labels:
              namespace: monitoring-proj01
              service: prometheus

      - job_name: forkwise-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: production-proj01|canary-proj01|staging-proj01|forkwise-data
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: environment

  alerts.yml: |
    groups:
      - name: forkwise-serving
        rules:
          - alert: ForkwiseProductionHighP95Latency
            expr: histogram_quantile(0.95, sum by (le) (rate(subst_request_latency_seconds_bucket{namespace="production-proj01"}[10m]))) > 0.5
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Production serving p95 latency is above 500ms
              description: Production substitution serving has exceeded the latency SLO for 10 minutes.

          - alert: ForkwiseProductionHighErrorRate
            expr: sum(rate(subst_requests_total{namespace="production-proj01",status="error"}[5m])) / sum(rate(subst_requests_total{namespace="production-proj01"}[5m])) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Production serving error rate is above 5%
              description: Production substitution serving is failing more than 5% of requests.

          - alert: ForkwiseProductionModelNotLoaded
            expr: max(subst_model_loaded{namespace="production-proj01"}) < 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Production serving is running on the stub model
              description: The production serving pod could not load the registered model artifact.

      - name: forkwise-data
        rules:
          - alert: ForkwiseFeedbackErrors
            expr: sum(rate(subst_feedback_errors_total{namespace="forkwise-data"}[5m])) > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Feedback service is failing to persist feedback
              description: The feedback endpoint is returning storage errors.
