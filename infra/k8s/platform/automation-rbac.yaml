apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forkwise-automation
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forkwise-automation
subjects:
  - kind: ServiceAccount
    name: automation-sa
    namespace: monitoring-proj01
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forkwise-automation
