apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forkwise-prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - services
      - endpoints
      - pods
      - namespaces
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forkwise-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: monitoring-proj01
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forkwise-prometheus
